<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Multimedia Responsiva</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='multimedia.css'>
</head>
<body>
    <h1 style="text-align: center;">Multimedia en la Web</h1>
    <p style="text-align: center;">En esta sección exploraremos cómo integrar contenido multimedia adaptable.</p>

    <main>
        <section>
            <h2>Imágenes</h2>
            <img src="https://placehold.co/600x400/png" alt="Ejemplo de imagen">
        </section>

        <section>
            <h2>Videos</h2>
            <video controls>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Tu navegador no soporta el elemento de video.
            </video>
        </section>

        <section>
            <h2>Audio</h2>
            <audio controls>
                <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
                Tu navegador no soporta el elemento de audio.
            </audio>
        </section>
    </main>

</body>
</html>
