<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semana 3: Propiedades Exhaustivas de Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Guía de Propiedades CSS Grid</h1>

    <div class="ejemplo-display">
        <div class="grid-bloque">Contenedor Block</div>
        <div class="grid-bloque">Contenedor Block</div>
        
        <div class="grid-inline">Inline 1</div>
        <div class="grid-inline">Inline 2</div>
        <span>(Texto fluyendo al lado)</span>
    </div>

    <hr>

    <div class="grid-estructura">
        <div class="caja">1</div>
        <div class="caja">2</div>
        <div class="caja">3</div>
        <div class="caja">4</div>
        <div class="caja">5</div>
        <div class="caja">6</div>
    </div>

    <hr>

    <div class="grid-layout">
        <header class="seccion header">Header</header>
        <nav class="seccion nav">Nav</nav>
        <main class="seccion main">Main (Uso de Span)</main>
        <aside class="seccion sidebar">Sidebar</aside>
        <footer class="seccion footer">Footer</footer>
    </div>

</body>
</html>
